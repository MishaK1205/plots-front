<div class="projects-map-wrapper">
  <div #mapContainer class="projects-map"></div>

  @if (hoveredProject(); as project) {
    @if (hoverCardPosition(); as position) {
      <div
        class="projects-map__hover-card"
        [class.projects-map__hover-card--visible]="hoverCardVisible()"
        [style.left.px]="position.x"
        [style.top.px]="position.y"
        (mouseenter)="onHoverCardEnter()"
        (mouseleave)="onHoverCardLeave()"
        (click)="onHoverCardClick(project, $event)"
      >
        <app-project-card [project]="project"></app-project-card>
      </div>
    }
  }
</div>
