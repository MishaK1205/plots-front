<div class="currency-toggle" [attr.data-active]="activeCurrency()">
  <app-button
    variant="ghost"
    size="xs"
    shape="circle"
    type="button"
    extraClass="currency-toggle__option currency-toggle__option--gel"
    [active]="activeCurrency() === 'GEL'"
    activeTone="primary"
    (click)="onCurrencyClick('GEL', $event)"
  >
    <span class="currency-toggle__symbol">₾</span>
  </app-button>

  <app-button
    variant="ghost"
    size="xs"
    shape="circle"
    type="button"
    extraClass="currency-toggle__option"
    [active]="activeCurrency() === 'USD'"
    activeTone="primary"
    (click)="onCurrencyClick('USD', $event)"
  >
    <span class="currency-toggle__symbol">$</span>
  </app-button>
</div>
