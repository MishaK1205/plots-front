<div
  class="location-autocomplete"
  [class.location-autocomplete--muted]="variant() === 'muted'"
>
  <input
    class="location-autocomplete__input"
    type="text"
    name="locationName"
    [placeholder]="'common.search.locationPlaceholder' | translate"
    [value]="locationName()"
    (input)="onInput($any($event.target).value)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    autocomplete="off"
    role="combobox"
    aria-autocomplete="list"
    [attr.aria-expanded]="autocompleteOpen()"
  />

  @if (autocompleteOpen()) {
    <ul class="location-autocomplete__suggestions" role="listbox">
      @for (location of suggestions(); track location.id) {
        <li role="presentation">
          <button
            type="button"
            class="location-autocomplete__suggestion"
            role="option"
            (mousedown)="selectLocation(location); $event.preventDefault()"
          >
            {{ getSuggestionLabel(location) }}
          </button>
        </li>
      }
    </ul>
  }
</div>
