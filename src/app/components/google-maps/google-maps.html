<div class="google-maps-container">
  <div class="map-search-container">
    <mat-form-field appearance="outline" class="location-search-field">
      <mat-label>Search for a location</mat-label>
      <input
        matInput
        [formControl]="locationSearchControl"
        [matAutocomplete]="locationAutocomplete"
        placeholder="Type a place or street name..."
        autocomplete="off"
      />
      <mat-icon matPrefix>search</mat-icon>
      <mat-autocomplete
        #locationAutocomplete="matAutocomplete"
        [displayWith]="displayLocationFn"
        (optionSelected)="onLocationSelected($event.option.value)"
      >
        @for (
          suggestion of locationSuggestions();
          track suggestion.placePrediction?.placeId || $index
        ) {
          <mat-option [value]="suggestion">
            <div class="suggestion-option">
              <mat-icon class="suggestion-icon">place</mat-icon>
              <div class="suggestion-text">
                <div class="suggestion-main">
                  {{ suggestion.description }}
                </div>
              </div>
            </div>
          </mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>
  </div>

  <google-map
    width="100%"
    [center]="center"
    [zoom]="zoom"
    [options]="mapOptions"
    (mapInitialized)="onMapInitialized($event)"
    (mapClick)="onMapClick($event)"
  >
  </google-map>
</div>
