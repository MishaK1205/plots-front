<section class="project-search">
  <div class="project-search__hero">
    <h1 class="project-search__title">მოძებნე მიწის ნაკვეთი აგარაკისთვის!</h1>
    <p class="project-search__subtitle">
      მიწის ნაკვეთები, სააგარაკე მიწები, ურბან პროექტები ერთ სივრცეში
    </p>
  </div>

  <div class="project-search__panel">
    <form class="project-search__bar" (ngSubmit)="onSearch()">
      <input
        class="project-search__input"
        type="text"
        name="locationName"
        placeholder="მაგ. თბილისის, ლისის ტბის მიმდებარედ"
        [(ngModel)]="locationName"
      />

      <input
        class="project-search__input"
        type="text"
        name="keyword"
        placeholder="ID, პროექტის დასახელება, ს/კ, ტელეფონი"
        [(ngModel)]="keyword"
      />

      <button
        class="project-search__filters-toggle"
        type="button"
        aria-label="Toggle filters"
        [class.project-search__filters-toggle--active]="filtersOpen()"
        (click)="toggleFilters()"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 5h9M14 5h2M11 2.5v5M2 13h2M7 13h9M7 10.5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>

      <button class="project-search__submit" type="submit">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" />
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <span>ძებნა</span>
      </button>
    </form>

    @if (filtersOpen()) {
      <div class="project-search__filters">
        <div class="project-search__filter-group">
          <span class="project-search__filter-label">სრული ფასი</span>
          <div class="project-search__filter-inputs">
            <input
              type="number"
              name="minTotalPrice"
              placeholder="დან"
              [(ngModel)]="minTotalPrice"
            />
            <input
              type="number"
              name="maxTotalPrice"
              placeholder="მდე"
              [(ngModel)]="maxTotalPrice"
            />
          </div>
        </div>

        <div class="project-search__filter-group">
          <span class="project-search__filter-label">1მ² ფასი</span>
          <div class="project-search__filter-inputs">
            <input
              type="number"
              name="minSquareMeterPrice"
              placeholder="დან"
              [(ngModel)]="minSquareMeterPrice"
            />
            <input
              type="number"
              name="maxSquareMeterPrice"
              placeholder="მდე"
              [(ngModel)]="maxSquareMeterPrice"
            />
          </div>
        </div>

        <div class="project-search__filter-group">
          <span class="project-search__filter-label">ფართობი (მ²)</span>
          <div class="project-search__filter-inputs">
            <input
              type="number"
              name="minSquareMeters"
              placeholder="დან"
              [(ngModel)]="minSquareMeters"
            />
            <input
              type="number"
              name="maxSquareMeters"
              placeholder="მდე"
              [(ngModel)]="maxSquareMeters"
            />
          </div>
        </div>
      </div>
    }

    <div class="project-search__footer">
      <div class="project-search__quick-filters">
        @for (filter of quickFilters; track filter) {
          <button
            class="project-search__chip"
            type="button"
            (click)="onQuickFilterClick(filter)"
          >
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" />
              <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <span>{{ filter }}</span>
          </button>
        }
      </div>

      @if (totalActiveProjects() !== null) {
        <span class="project-search__total">
          <span class="project-search__total-dot"></span>
          სულ აქტიურია {{ totalActiveProjects() }} განცხადება
        </span>
      }
    </div>
  </div>
</section>
