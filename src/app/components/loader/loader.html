<div
  class="loader"
  [class.loader--overlay]="overlay()"
  [class.loader--fullscreen]="fullscreen()"
  role="status"
  aria-live="polite"
>
  <span class="loader__spinner" aria-hidden="true">
    <span class="loader__ring loader__ring--outer"></span>
    <span class="loader__ring loader__ring--inner"></span>
    <span class="loader__core"></span>
  </span>

  @if (label()) {
    <span class="loader__label">{{ label() }}</span>
  }
</div>
