<div class="language-switcher">
  <app-button
    variant="outline"
    size="md"
    type="button"
    extraClass="language-switcher__trigger"
    ariaLabel="Select language"
    [ariaExpanded]="languageMenuOpen"
    (click)="toggleMenu()"
  >
    <svg
      class="language-switcher__icon"
      width="19"
      height="19"
      viewBox="0 0 19 19"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <path
        d="M17.4167 9.08333C17.4167 13.6857 13.6857 17.4167 9.08333 17.4167M17.4167 9.08333C17.4167 4.48096 13.6857 0.75 9.08333 0.75M17.4167 9.08333H0.75M9.08333 17.4167C4.48096 17.4167 0.75 13.6857 0.75 9.08333M9.08333 17.4167C11.1677 15.1347 12.3523 12.1733 12.4167 9.08333C12.3523 5.99336 11.1677 3.03196 9.08333 0.75M9.08333 17.4167C6.99893 15.1347 5.81437 12.1733 5.75 9.08333C5.81437 5.99336 6.99893 3.03196 9.08333 0.75M0.75 9.08333C0.75 4.48096 4.48096 0.75 9.08333 0.75"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>

    <span>{{ selectedLanguageLabel() }}</span>

    <img
      class="language-switcher__chevron"
      src="assets/icons/arrow-down.svg"
      alt=""
      aria-hidden="true"
    />
  </app-button>

  @if (languageMenuOpen) {
    <ul class="language-switcher__menu">
      @for (language of languages; track language.value) {
        <li>
          <app-button
            variant="ghost"
            size="md"
            type="button"
            extraClass="language-switcher__option"
            [active]="language.value === selectedLanguage()"
            activeTone="muted"
            [fullWidth]="true"
            (click)="selectLanguage(language.value)"
          >
            {{ language.label }}
          </app-button>
        </li>
      }
    </ul>
  }
</div>
