<div class="locations-container">
  <mat-toolbar class="toolbar" color="primary">
    <span>Locations Management</span>
    <button mat-raised-button color="accent" routerLink="/admin/add-location">
      <mat-icon>add</mat-icon>
      Add Location
    </button>
  </mat-toolbar>

  <mat-card class="table-card">
    <mat-card-content>
      @if (!isLoading()) {
        <div class="table-container">
          <table mat-table [dataSource]="dataSource" class="locations-table">
            <!-- Name Column -->
            <ng-container matColumnDef="locationName">
              <th mat-header-cell *matHeaderCellDef>Location Name</th>
              <td mat-cell *matCellDef="let location">
                <div class="localized-name">
                  <strong>{{ location.locationName.geo }}</strong>
                  <small>{{ location.locationName.eng }}</small>
                  <small>{{ location.locationName.rus }}</small>
                </div>
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let location">
                <button
                  mat-icon-button
                  color="accent"
                  title="Edit"
                  [routerLink]="['/admin/edit-location', location.id]"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  color="warn"
                  title="Delete"
                  (click)="onDelete(location)"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>

          <mat-paginator
            [length]="totalItems()"
            [pageIndex]="currentPage()"
            [pageSize]="pageSize()"
            [pageSizeOptions]="[5, 10, 25, 50]"
            [showFirstLastButtons]="true"
            (page)="onPageChange($event)"
          >
          </mat-paginator>
        </div>
      } @else {
        <div class="loading-container">
          <mat-spinner diameter="50"></mat-spinner>
          <p>Loading locations...</p>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
