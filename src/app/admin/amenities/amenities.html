<div class="amenities-container">
  <mat-toolbar class="toolbar" color="primary">
    <span>Amenities Management</span>
    <button mat-raised-button color="accent" routerLink="/admin/add-amenity">
      <mat-icon>add</mat-icon>
      Add Amenity
    </button>
  </mat-toolbar>

  <mat-card class="table-card">
    <mat-card-content>
      @if (!isLoading()) {
        <div class="table-container">
          <table mat-table [dataSource]="dataSource" class="amenities-table">
            <!-- Name Column -->
            <ng-container matColumnDef="amenityName">
              <th mat-header-cell *matHeaderCellDef>Amenity Name</th>
              <td mat-cell *matCellDef="let amenity">
                <div class="localized-name">
                  <strong>{{ amenity.amenityName.geo }}</strong>
                  <small>{{ amenity.amenityName.eng }}</small>
                  <small>{{ amenity.amenityName.rus }}</small>
                </div>
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let amenity">
                <button
                  mat-icon-button
                  color="accent"
                  title="Edit"
                  [routerLink]="['/admin/edit-amenity', amenity.id]"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  color="warn"
                  title="Delete"
                  (click)="onDelete(amenity)"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>

          <mat-paginator
            [length]="totalItems()"
            [pageIndex]="currentPage()"
            [pageSize]="pageSize()"
            [pageSizeOptions]="[5, 10, 25, 50]"
            [showFirstLastButtons]="true"
            (page)="onPageChange($event)"
          >
          </mat-paginator>
        </div>
      } @else {
        <div class="loading-container">
          <mat-spinner diameter="50"></mat-spinner>
          <p>Loading amenities...</p>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
